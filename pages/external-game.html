<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bull in a China Shop Run</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* In-Game UI */
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #FFF;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            display: none;
        }
        #goal {
            font-size: 16px;
            color: #FFD700;
        }
        #in-game-high-score {
            font-size: 16px;
            color: #00FFCC;
        }
        
        /* Start Screen Styles */
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(17, 17, 17, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            pointer-events: auto;
        }
        #start-screen h1 {
            font-size: 64px;
            margin-bottom: 10px;
            color: #FFD700;
            text-shadow: 3px 3px 6px #000;
            text-align: center;
        }
        .instruction-text {
            font-size: 24px;
            margin: 10px 0;
            text-align: center;
            color: #DDD;
        }
        #high-score-display {
            font-size: 28px;
            color: #00FFCC;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 2px 2px 4px #000;
        }
        
        /* Buttons */
        .game-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 28px;
            font-weight: bold;
            background-color: #8B4513;
            color: white;
            border: 3px solid #a0522d;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 6px 0 #5c2e0b;
            pointer-events: auto;
        }
        .game-btn:hover {
            background-color: #a0522d;
            transform: translateY(2px);
            box-shadow: 0 4px 0 #5c2e0b;
        }
        .game-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #5c2e0b;
        }

        /* Game Over / Win Screen */
        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            display: none;
            text-shadow: 3px 3px 6px #000;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #555;
        }
        #message-box h1 {
            font-size: 64px;
            margin: 0 0 10px 0;
        }
        #message-box p {
            font-size: 24px;
            margin: 0 0 20px 0;
        }

        /* Footer Styles */
        #page-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            text-align: center;
            padding: 15px 0;
            z-index: 100;
            border-top: 2px solid #333;
        }

        #page-footer a {
            color: #FFD700;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s ease-in-out;
        }

        #page-footer a:hover {
            color: #FFF;
            text-shadow: 0 0 10px #FFD700;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="start-screen">
            <h1>Bull in a China Shop</h1>
            <p class="instruction-text">🐂 <strong>Your Goal:</strong> Cause absolute chaos.</p>
            <p class="instruction-text">Smash the fine china (100 pts each).</p>
            <p class="instruction-text">Dodge the heavy shelves (🗄️).</p>
            <p class="instruction-text"><strong>Controls:</strong> LEFT and RIGHT arrows (or A/D)</p>
            <p class="instruction-text" style="color: #FFD700; margin-top: 10px;">Target: 100,000 Points</p>
            
            <div id="high-score-display">High Score: 0</div>
            
            <button id="start-btn" class="game-btn">Start Rampage</button>
        </div>

        <div id="score-board">
            Score: <span id="score">0</span>
            <div id="goal">Target: 100,000</div>
            <div id="in-game-high-score">High Score: 0</div>
        </div>
        
        <div id="message-box">
            <h1 id="status-title">CRASHED!</h1>
            <p id="status-sub">Hit a shelf.</p>
            <button id="menu-btn" class="game-btn">Back to Menu</button>
        </div>
    </div>

    <div id="page-footer">
        <a href="../index.html">⬅ Return to Main Site</a>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI Elements
        const scoreEl = document.getElementById('score');
        const scoreBoard = document.getElementById('score-board');
        const messageBox = document.getElementById('message-box');
        const statusTitle = document.getElementById('status-title');
        const statusSub = document.getElementById('status-sub');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const menuBtn = document.getElementById('menu-btn');
        const highScoreDisplay = document.getElementById('high-score-display');
        const inGameHighScore = document.getElementById('in-game-high-score');

        // High Score setup via LocalStorage
        let highScore = localStorage.getItem('bullHighScore') || 0;
        updateHighScoreUI();

        function updateHighScoreUI() {
            highScoreDisplay.innerText = `High Score: ${highScore}`;
            inGameHighScore.innerText = `High Score: ${highScore}`;
        }

        let width, height;
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);

        // Assets
        const bowlSprites = ['🥣', '🍵', '☕', '🍚', '🏺', '🍷', '🥂', '🍹', '🍶', '🍽️'];
        const obstacleSprite = '🗄️';
        const bullSprite = '🐂';

        // Pre-generate static background decor to stop flickering
        const bgDecor = [];
        for (let i = -1.8; i <= 1.8; i += 0.4) {
            if (Math.abs(i) > 1.2 || Math.abs(i) < 0.2) {
                bgDecor.push({
                    lane: i,
                    sprite: bowlSprites[Math.floor(Math.random() * bowlSprites.length)],
                    hasShelf: Math.random() > 0.6
                });
            }
        }

        // Game Constants
        const WIN_SCORE = 100000;
        const POINTS_PER_BOWL = 100;
        
        // --- MODERATE SPEED TWEAKS ---
        // Balanced directly between Version 2 and Version 3
        const BASE_SPEED = 0.008; 
        
        // Game State Variables
        let score = 0;
        let speed = BASE_SPEED;    
        let targetLane = 0;   
        let currentLane = 0;  
        let objects = [];     
        let particles = [];   
        let spawnTimer = 0;
        let isGameOver = false;
        let isGameRunning = false;

        // Input Handling
        window.addEventListener('keydown', (e) => {
            if (!isGameRunning || isGameOver) return;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                if (targetLane > -1) targetLane--;
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                if (targetLane < 1) targetLane++;
            }
        });

        // 3D Perspective Projection
        function project(lane, z) {
            const scale = Math.pow(z, 3); 
            const y = (height * 0.3) + ((height * 0.7) * scale);
            const x = (width / 2) + (lane * (width * 0.35) * scale);
            return { x, y, scale };
        }

        function spawnObjects() {
            const lanes = [-1, 0, 1];
            lanes.sort(() => Math.random() - 0.5);

            objects.push({
                z: 0,
                lane: lanes[0],
                isBowl: true,
                sprite: bowlSprites[Math.floor(Math.random() * bowlSprites.length)],
                hit: false
            });

            let difficultyMultiplier = speed / BASE_SPEED; 
            
            if (Math.random() > (0.4 / difficultyMultiplier)) {
                const isSecondBowl = Math.random() > 0.4;
                objects.push({
                    z: 0,
                    lane: lanes[1],
                    isBowl: isSecondBowl,
                    sprite: isSecondBowl ? bowlSprites[Math.floor(Math.random() * bowlSprites.length)] : obstacleSprite,
                    hit: false
                });
            }
        }

        function createSmashEffect(x, y) {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() * -10) - 5,
                    life: 1.0
                });
            }
        }

        function checkHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('bullHighScore', highScore);
                updateHighScoreUI();
            }
        }

        function winGame() {
            isGameOver = true;
            checkHighScore();
            statusTitle.innerText = "YOU WIN!";
            statusTitle.style.color = "#FFD700";
            statusSub.innerText = "You completely destroyed the China Shop!\nFinal Score: " + score;
            messageBox.style.display = 'block';
        }

        function loseGame() {
            isGameOver = true;
            checkHighScore();
            statusTitle.innerText = "CRASHED!";
            statusTitle.style.color = "#FF4444";
            statusSub.innerText = `You hit a shelf.\nFinal Score: ${score}`;
            messageBox.style.display = 'block';
        }

        function update() {
            if (isGameOver || !isGameRunning) return;

            currentLane += (targetLane - currentLane) * 0.2;
            
            // --- MODERATE PROGRESSION ---
            speed = BASE_SPEED + (score / WIN_SCORE) * 0.053;
            
            spawnTimer += speed;
            if (spawnTimer > 0.5) {
                spawnObjects();
                spawnTimer = 0;
            }

            for (let i = objects.length - 1; i >= 0; i--) {
                let obj = objects[i];
                obj.z += speed;

                if (obj.z > 0.95 && obj.z < 1.05 && !obj.hit) {
                    if (Math.abs(currentLane - obj.lane) < 0.5) {
                        obj.hit = true;
                        
                        if (obj.isBowl) {
                            score += POINTS_PER_BOWL;
                            scoreEl.innerText = score;
                            
                            const proj = project(obj.lane, obj.z);
                            createSmashEffect(proj.x, proj.y);
                            
                            if (score >= WIN_SCORE) winGame();
                        } else {
                            loseGame();
                        }
                    }
                }

                if (obj.z > 1.2) {
                    objects.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.5;
                p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawBackground() {
            // Distant Background Walls/Sky
            ctx.fillStyle = '#2c1e16';
            ctx.fillRect(0, 0, width, height * 0.3);

            // Detailed Floor
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.moveTo(0, height * 0.3);
            ctx.lineTo(width, height * 0.3);
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.fill();

            // Distant Wall Decor
            ctx.font = '20px Arial';
            ctx.fillStyle = 'rgba(200, 200, 200, 0.4)'; // Kept slight opacity for depth
            ctx.textAlign = 'center';
            
            bgDecor.forEach(decor => {
                let distProj = project(decor.lane, 0.05);
                if (distProj.scale > 0.005) {
                    ctx.fillText(decor.sprite, distProj.x, distProj.y);
                }
                if (decor.hasShelf) {
                    let shelfProj = project(decor.lane + (decor.lane > 0 ? 0.1 : -0.1), 0.08);
                    ctx.fillText(obstacleSprite, shelfProj.x, shelfProj.y);
                }
            });
            
            // Distant Hanging Lamps
            ctx.font = '25px Arial';
            [-1.5, 1.5].forEach(laneOffset => { 
                for (let d = 0.1; d <= 1.0; d += 0.3) {
                    let lampProj = project(laneOffset * 1.05, d); 
                    if (lampProj.scale > 0.01) {
                        ctx.fillText(d < 0.5 ? '🏮' : '💡', lampProj.x, lampProj.y - (30 * lampProj.scale)); 
                    }
                }
            });

            // Detailed Lane Dividers
            ctx.strokeStyle = '#a0522d';
            ctx.lineWidth = 4;
            [-1.5, -0.5, 0.5, 1.5].forEach(laneOffset => {
                ctx.beginPath();
                let top = project(laneOffset, 0);
                let bottom = project(laneOffset, 1.2);
                ctx.moveTo(top.x, top.y);
                ctx.lineTo(bottom.x, bottom.y);
                ctx.stroke();
                
                ctx.save();
                ctx.strokeStyle = '#93664d'; 
                ctx.lineWidth = 1.5;
                for (let i = 1; i <= 2; i++) {
                   ctx.beginPath();
                   let lineTop = project(laneOffset + (i / 3) * (laneOffset < 0 ? 1 : -1), 0);
                   let lineBottom = project(laneOffset + (i / 3) * (laneOffset < 0 ? 1 : -1), 1.2);
                   ctx.moveTo(lineTop.x, lineTop.y);
                   ctx.lineTo(lineBottom.x, lineBottom.y);
                   ctx.stroke();
                }
                ctx.restore();
            });
        }

        function draw() {
            drawBackground();

            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            
            // FIX: Resetting fillStyle here ensures main sprites are solid and opaque
            ctx.fillStyle = '#FFFFFF'; 

            let renderList = [...objects].sort((a, b) => a.z - b.z);

            renderList.forEach(obj => {
                if (obj.hit && obj.isBowl) return; 
                
                let proj = project(obj.lane, obj.z);
                if (proj.scale > 0.01) {
                    ctx.font = `${120 * proj.scale}px Arial`;
                    ctx.fillText(obj.sprite, proj.x, proj.y);
                }
            });

            if (isGameRunning && !isGameOver) {
                let bullProj = project(currentLane, 1.0);
                ctx.font = `100px Arial`;
                ctx.fillText(bullSprite, bullProj.x, bullProj.y + 20);
            }

            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.font = `40px Arial`;
                ctx.fillText('💥', p.x, p.y);
            });
            ctx.globalAlpha = 1.0;
        }

        function gameLoop() {
            update();
            draw();
            if (isGameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        function resetGame() {
            score = 0;
            scoreEl.innerText = score;
            speed = BASE_SPEED;
            targetLane = 0;
            currentLane = 0;
            objects = [];
            particles = [];
            spawnTimer = 0;
            isGameOver = false;
        }

        resizeCanvas();

        startBtn.addEventListener('click', () => {
            resetGame();
            startScreen.style.display = 'none';
            scoreBoard.style.display = 'block';
            isGameRunning = true;
            requestAnimationFrame(gameLoop);
        });

        menuBtn.addEventListener('click', () => {
            messageBox.style.display = 'none';
            scoreBoard.style.display = 'none';
            startScreen.style.display = 'flex';
            isGameRunning = false;
        });

    </script>
</body>
</html>
